<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Interactive Smart Map</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#050505;
    font-family:'Poppins',sans-serif;
    overflow-x:hidden;
}

/* ======================================================
   SECTION
====================================================== */

.smart-map-section{
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:80px 20px;
    position:relative;
    overflow:hidden;
}

/* background glow */

.smart-map-section::before{
    content:"";
    position:absolute;
    width:700px;
    height:700px;
    background:radial-gradient(circle,#ff7b0020 0%,transparent 70%);
    top:-200px;
    right:-200px;
    animation:bgFloat 8s ease-in-out infinite;
}

.smart-map-section::after{
    content:"";
    position:absolute;
    width:500px;
    height:500px;
    background:radial-gradient(circle,#ff7b0015 0%,transparent 70%);
    bottom:-150px;
    left:-150px;
    animation:bgFloat 10s ease-in-out infinite reverse;
}

@keyframes bgFloat{
    0%,100%{
        transform:translateY(0px);
    }
    50%{
        transform:translateY(-40px);
    }
}

/* ======================================================
   SCENE
====================================================== */

.imagemap-scene{
    width:100%;
    max-width:1400px;
    position:relative;
    perspective:1500px;
}

/* ======================================================
   IMAGE MAP
====================================================== */

.imagemap{
    position:relative;
    transform-style:preserve-3d;
}

.main-image{
    width:100%;
    display:block;
    border-radius:30px;
    box-shadow:
        0 20px 80px rgba(0,0,0,.5),
        0 0 60px rgba(255,123,0,.15);

    transform-style:preserve-3d;
}

/* ======================================================
   HOTSPOTS
====================================================== */

.area{
    position:absolute;
    width:22px;
    height:22px;
    border-radius:50%;
    background:#ff7b00;
    z-index:20;
    cursor:pointer;
    text-decoration:none;

    display:flex;
    align-items:center;
    justify-content:center;

    animation:
        hotspotFloat 4s ease-in-out infinite,
        hotspotPulse 2s infinite;
}

/* center dot */

.area::after{
    content:"";
    width:8px;
    height:8px;
    border-radius:50%;
    background:white;
}

/* outer ring */

.area::before{
    content:"";
    position:absolute;
    inset:-12px;
    border-radius:50%;
    border:2px solid rgba(255,123,0,.5);

    animation:ripple 2s infinite;
}

/* ======================================================
   HOVER DISPLAY
====================================================== */

.hover-display{
    position:relative;
    opacity:0;
    pointer-events:none;

    transform:
        translateY(20px)
        scale(.8)
        rotateX(-15deg);

    transition:
        opacity .5s ease,
        transform .5s cubic-bezier(.17,.84,.44,1);
}

/* active */

.area:hover .hover-display,
.area.active-animate .hover-display{
    opacity:1;
    transform:
        translateY(0)
        scale(1)
        rotateX(0deg);
}

/* ======================================================
   CARD
====================================================== */

.info-box{
    position:absolute;

    width:220px;

    backdrop-filter:blur(20px);

    background:rgba(18,18,18,.75);

    border:1px solid rgba(255,123,0,.4);

    border-radius:20px;

    padding:20px;

    box-shadow:
        0 15px 50px rgba(0,0,0,.5),
        0 0 30px rgba(255,123,0,.15);

    overflow:hidden;
}

.info-box img{
    width:70px;
    margin-bottom:12px;
}

.info-box span{
    color:white;
    font-size:18px;
    font-weight:600;
    line-height:1.4;
}

/* ======================================================
   CONNECTOR LINES
====================================================== */

.hover-display::before{
    content:"";
    position:absolute;
    height:2px;
    width:120px;

    background:linear-gradient(
        90deg,
        #ff7b00,
        #ffd000
    );

    box-shadow:
        0 0 10px #ff7b00,
        0 0 20px #ff7b00;
}

/* ======================================================
   ANIMATIONS
====================================================== */

@keyframes hotspotFloat{
    0%,100%{
        transform:translateY(0px);
    }
    50%{
        transform:translateY(-8px);
    }
}

@keyframes hotspotPulse{
    0%{
        box-shadow:0 0 0 0 rgba(255,123,0,.7);
    }
    70%{
        box-shadow:0 0 0 20px rgba(255,123,0,0);
    }
    100%{
        box-shadow:0 0 0 0 rgba(255,123,0,0);
    }
}

@keyframes ripple{
    0%{
        transform:scale(.5);
        opacity:1;
    }
    100%{
        transform:scale(1.8);
        opacity:0;
    }
}

/* ======================================================
   POSITIONING
====================================================== */

/* ENERGY */

.energy{
    top:18%;
    left:25%;
}

.energy .info-box{
    left:-260px;
    top:-80px;
}

.energy .hover-display::before{
    left:-120px;
    top:30px;
}

/* TELECOM */

.telecom{
    top:24%;
    left:54%;
}

.telecom .info-box{
    left:120px;
    top:-180px;
}

.telecom .hover-display::before{
    left:20px;
    top:-20px;
    width:100px;
}

/* LIGHTING */

.lighting{
    top:30%;
    left:74%;
}

.lighting .info-box{
    left:120px;
    top:-100px;
}

.lighting .hover-display::before{
    left:20px;
    top:30px;
}

/* NETWORK */

.network{
    top:50%;
    left:16%;
}

.network .info-box{
    left:-250px;
    top:-80px;
}

.network .hover-display::before{
    left:-120px;
    top:30px;
}

/* SECURITY */

.security{
    top:78%;
    left:56%;
}

.security .info-box{
    left:140px;
    top:-20px;
}

.security .hover-display::before{
    left:20px;
    top:40px;
}

/* ======================================================
   MOBILE
====================================================== */

@media(max-width:768px){

    .info-box{
        width:170px;
        padding:15px;
    }

    .info-box span{
        font-size:14px;
    }

    .info-box img{
        width:50px;
    }

    .area{
        width:16px;
        height:16px;
    }

}

</style>
</head>

<body>

<section class="smart-map-section">

    <div class="imagemap-scene">

        <div class="imagemap">

            <!-- MAIN IMAGE -->
            <img
                src="assets/img/techunifi-iso-home.png"
                class="main-image"
                alt="Smart Services"
            >

            <!-- ENERGY -->
            <a href="#" class="area energy">

                <div class="hover-display">

                    <div class="info-box">
                        <img src="assets/img/services/home-image-map/hover/ev-charging.png">
                        <span>Energy Management</span>
                    </div>

                </div>

            </a>

            <!-- TELECOM -->
            <a href="#" class="area telecom">

                <div class="hover-display">

                    <div class="info-box">
                        <img src="assets/img/services/home-image-map/hover/telecom.png">
                        <span>Telecom Infrastructure</span>
                    </div>

                </div>

            </a>

            <!-- LIGHTING -->
            <a href="#" class="area lighting">

                <div class="hover-display">

                    <div class="info-box">
                        <img src="assets/img/services/home-image-map/hover/lightning.png">
                        <span>Smart Lighting</span>
                    </div>

                </div>

            </a>

            <!-- NETWORK -->
            <a href="#" class="area network">

                <div class="hover-display">

                    <div class="info-box">
                        <img src="assets/img/services/home-image-map/hover/wifi.png">
                        <span>Networking Systems</span>
                    </div>

                </div>

            </a>

            <!-- SECURITY -->
            <a href="#" class="area security">

                <div class="hover-display">

                    <div class="info-box">
                        <img src="assets/img/services/home-image-map/hover/security.png">
                        <span>Security Solutions</span>
                    </div>

                </div>

            </a>

        </div>

    </div>

</section>

<!-- GSAP -->
<script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/gsap.min.js"></script>

<script>

document.addEventListener("DOMContentLoaded",()=>{

    const scene = document.querySelector(".imagemap-scene");
    const image = document.querySelector(".main-image");
    const areas = document.querySelectorAll(".area");

    let currentIndex = 0;
    let interval;

    /* =========================================
       INTRO
    ========================================= */

    gsap.from(image,{
        scale:1.15,
        opacity:0,
        duration:1.5,
        ease:"power3.out"
    });

    gsap.from(areas,{
        opacity:0,
        scale:0,
        stagger:0.12,
        duration:1,
        ease:"back.out(1.7)",
        delay:.5
    });

    /* =========================================
       PARALLAX
    ========================================= */

    scene.addEventListener("mousemove",(e)=>{

        const rect = scene.getBoundingClientRect();

        const x = e.clientX - rect.left;
        const y = e.clientY - rect.top;

        const moveX = (x / rect.width - 0.5) * 40;
        const moveY = (y / rect.height - 0.5) * 40;

        gsap.to(image,{
            x:moveX,
            y:moveY,
            duration:1,
            ease:"power3.out"
        });

        areas.forEach((area,index)=>{

            gsap.to(area,{
                x:moveX * (index + 1) * 0.08,
                y:moveY * (index + 1) * 0.08,
                duration:1,
                ease:"power3.out"
            });

        });

    });

    /* =========================================
       AUTO PLAY
    ========================================= */

    function activateArea(index){

        areas.forEach(area=>{
            area.classList.remove("active-animate");
        });

        const active = areas[index];

        active.classList.add("active-animate");

        gsap.fromTo(active,
        {
            scale:1
        },
        {
            scale:1.3,
            duration:.7,
            yoyo:true,
            repeat:1,
            ease:"power2.inOut"
        });

        currentIndex = (index + 1) % areas.length;
    }

    function startLoop(){

        activateArea(currentIndex);

        interval = setInterval(()=>{
            activateArea(currentIndex);
        },3000);

    }

    function stopLoop(){
        clearInterval(interval);
    }

    startLoop();

    /* =========================================
       HOVER
    ========================================= */

    areas.forEach((area,index)=>{

        area.addEventListener("mouseenter",()=>{

            stopLoop();

            gsap.to(area,{
                scale:1.5,
                duration:.4,
                ease:"back.out(2)"
            });

        });

        area.addEventListener("mouseleave",()=>{

            gsap.to(area,{
                scale:1,
                duration:.4
            });

            currentIndex = (index + 1) % areas.length;

            startLoop();

        });

    });

});

</script>

</body>
</html>
